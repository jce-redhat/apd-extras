---
# Event-Driven Ansible: Splunk to ServiceNow Integration Demo
#
# IMPORTANT: This demo requires both 'splunk' and 'snow' demos to be installed first
#
# This demo creates an automated response workflow:
# 1. User account created on Linux host (useradd command)
# 2. Splunk monitors system logs and detects the event
# 3. Splunk sends webhook to EDA event stream
# 4. EDA rulebook matches event and triggers job template
# 5. ServiceNow incident created with enriched event data

controller_templates:
  - name: EDA Demo | Create incident from Splunk event
    job_type: run
    inventory: Ansible Product Demos Inventory
    credentials:
      - SNOW
    project: APD Extras
    playbook: demos/eda_splunk_snow/create-incident.yml
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Short Description
          variable: incident_short_description
          required: true
          type: text
        - question_name: Description
          variable: incident_description
          required: false
          type: textarea
        - question_name: Category
          variable: incident_category
          required: false
          type: multiplechoice
          choices:
            - Inquiry / Help
            - Software
            - Hardware
            - Network
            - Database
            - Security
        - question_name: Urgency
          variable: incident_urgency
          required: false
          type: multiplechoice
          choices:
            - '1'
            - '2'
            - '3'
            - '4'
            - '5'
          default: '3'
        - question_name: Impact
          variable: incident_impact
          required: false
          type: multiplechoice
          choices:
            - '1'
            - '2'
            - '3'
            - '4'
            - '5'
          default: '3'
        - question_name: Assigned To
          variable: incident_assigned_to
          required: false
          type: multiplechoice
          choices:
            - ''
            - edademo
            - svc.desk
            - jce
          default: ''
        - question_name: Affected Host
          variable: affected_host
          required: false
          type: text
        - question_name: Event Logs
          variable: event_logs
          required: false
          type: textarea
        - question_name: Event Timestamp
          variable: event_timestamp
          required: false
          type: text
        - question_name: Username Created
          variable: username_created
          required: false
          type: text
        - question_name: Splunk Web Link
          variable: splunk_web_link
          required: false
          type: text

  - name: EDA Demo | Add user to trigger Splunk event
    job_type: run
    inventory: Ansible Product Demos Inventory
    credentials:
      - APD Machine Credential
    project: APD Extras
    playbook: demos/eda_splunk_snow/add-new-user.yml
    execution_environment: Product Demos EE
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Splunk client instance name
          variable: target_hosts
          required: true
          type: text
          default: apd-splunk-client
        - question_name: New user name
          description: Username for new account
          variable: new_account_username
          required: true
          type: text
          default: demouser

eda_credentials:
  - name: AAP Credential for EDA
    description: Credential allowing rulebook activations to connect to the automation controller
    state: present
    credential_type: Red Hat Ansible Automation Platform
    organization: Ansible Product Demos (APD)
    inputs:
      # Note: API path required in AAP 2.5+ for AAP credential used by EDA
      host: '{{ lookup("env","AAP_HOSTNAME") | default("https://example.invalid") }}/api/controller'
      username: '{{ lookup("env","AAP_USERNAME") | default(omit) }}'
      password: '{{ lookup("env","AAP_PASSWORD") | default(omit) }}'
      oauth_token: '{{ lookup("env","AAP_TOKEN") | default(omit) }}'
      verify_ssl: '{{ lookup("env","AAP_VALIDATE_CERTS") | default(omit) }}'

  - name: Splunk API token
    description: Token credential for Splunk to authenticate webhook calls to EDA event stream
    state: present
    credential_type: Token Event Stream
    organization: Ansible Product Demos (APD)
    inputs:
      token: '{{ lookup("env","SPLUNK_EDA_TOKEN") | default("CHANGEME-EDA-Demo", true) }}'

eda_projects:
  - name: APD Extras
    description: Additional AAP resources for use with Ansible Product Demos
    state: present
    scm_url: https://github.com/jce-redhat/apd-extras.git
    scm_branch: '{{ apd_extras_git_repo_branch | default("main") }}'
    organization: Ansible Product Demos (APD)

eda_event_streams:
  - name: Splunk Events
    state: present
    organization: Ansible Product Demos (APD)
    credential_name: Splunk API token
    forward_events: true

eda_rulebook_activations:
  - name: Splunk Useradd to ServiceNow
    description: Monitor user creation events from Splunk and create ServiceNow incidents
    state: enabled
    organization: Ansible Product Demos (APD)
    project: APD Extras
    rulebook: splunk-useradd.yml
    decision_environment: Default Decision Environment
    eda_credentials:
      - AAP Credential for EDA
    event_streams:
      - event_stream: Splunk Events
        source_name: Splunk Events  # must match the source name in the rulebook
    restart_policy: on-failure
    log_level: info

...
# vim: ft=yaml.ansible
