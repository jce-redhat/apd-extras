---
- name: Install Splunk Enterprise on EC2 instance
  hosts: "{{ splunk_instance_name | default('apd-splunk') }}"
  become: true
  gather_facts: true

  vars:
    splunk_download_url: '{{ splunk_download_url | default("") }}'
    # Splunk installation defaults
    splunk:
      user: splunk
      group: splunk
      exec: /opt/splunk/bin/splunk
      home: /opt/splunk
      license_uri: null  # Use Splunk Free license
      admin_password: '{{ lookup("env", "SPLUNK_ADMIN_PASSWORD") | default("changeme123") }}'
      build_location: '{{ splunk_download_url if splunk_download_url else omit }}'
      opt:
        splunk_home_ownership_enforcement: false

  pre_tasks:
    - name: Ensure Splunk admin password is set
      ansible.builtin.assert:
        that:
          - 'lookup("env", "SPLUNK_ADMIN_PASSWORD") | length > 0'
        fail_msg: >
          'SPLUNK_ADMIN_PASSWORD' variable must be set, either as an environment
          variable or in an attached AAP credential

    - name: Install required packages
      ansible.builtin.package:
        name:
          - wget
          - tar
          - gzip
        state: present

    - name: Create Splunk group
      ansible.builtin.group:
        name: '{{ splunk.group }}'
        system: true
        state: present

    - name: Create Splunk user
      ansible.builtin.user:
        name: '{{ splunk.user }}'
        group: '{{ splunk.group }}'
        create_home: true
        system: true
        state: present

  tasks:
    - name: Download Splunk Enterprise from HTTPS
      ansible.builtin.get_url:
        url: '{{ splunk.build_location }}'
        dest: /tmp/splunk.tgz
        mode: '0644'
      when:
        - splunk_download_url | length > 0
        - not splunk_download_url.startswith('s3://')

    - name: Download Splunk Enterprise from S3
      amazon.aws.s3_object:
        bucket: '{{ splunk_download_url | regex_replace("^s3://([^/]+)/.*", "\1") }}'
        object: '{{ splunk_download_url | regex_replace("^s3://[^/]+/", "") }}'
        dest: /tmp/splunk.tgz
        mode: get
      when:
        - splunk_download_url | length > 0
        - splunk_download_url.startswith('s3://')

    - name: Create Splunk installation directory
      ansible.builtin.file:
        path: '{{ splunk.home }}'
        state: directory
        owner: '{{ splunk.user }}'
        group: '{{ splunk.group }}'
        mode: '0755'

    - name: Extract Splunk tarball
      ansible.builtin.unarchive:
        src: /tmp/splunk.tgz
        dest: /opt
        remote_src: true
        owner: '{{ splunk.user }}'
        group: '{{ splunk.group }}'
      when: splunk_download_url | length > 0

    - name: Accept Splunk license and set admin password
      ansible.builtin.command:
        cmd: >
          {{ splunk.exec }} start
          --accept-license
          --answer-yes
          --no-prompt
          --seed-passwd {{ splunk.admin_password }}
        creates: '{{ splunk.home }}/etc/splunk-launch.conf'
      become_user: '{{ splunk.user }}'

    - name: Enable Splunk to start at boot
      ansible.builtin.command:
        cmd: '{{ splunk.exec }} enable boot-start -user {{ splunk.user }}'
        creates: /etc/init.d/splunk
      when: ansible_service_mgr != 'systemd'

    - name: Enable Splunk systemd service
      ansible.builtin.systemd:
        name: Splunkd
        enabled: true
        daemon_reload: true
      when: ansible_service_mgr == 'systemd'

    - name: Ensure Splunk is running
      ansible.builtin.service:
        name: splunk
        state: started

  post_tasks:
    - name: Display Splunk web URL
      ansible.builtin.debug:
        msg:
          - "Splunk Enterprise installed successfully"
          - "Splunk Web URL: http://{{ ansible_default_ipv4.address }}:8000"
          - "Username: admin"
          - "Password: {{ splunk.admin_password }}"

...
