---
controller_credential_types:
  - name: Splunk Enterprise
    description: Credentials for Splunk Enterprise
    kind: cloud
    inputs:
      fields:
        - id: splunk_user
          type: string
          label: Splunk Enterprise user
          help_text: Password for connecting to Splunk Enterprise
        - id: splunk_password
          type: string
          label: Splunk Enterprise password
          help_text: Password for connecting to Splunk Enterprise
          secret: true
        - id: splunk_validate_certs
          type: string
          label: Splunk Enterprise verify SSL
          help_text: Validate SSL certificate when connecting to Splunk Enterprise
      required:
        - splunk_user
        - splunk_password
    injectors:
      env:
        SPLUNK_USER: !unsafe '{{ splunk_user }}'
        SPLUNK_PASSWORD: !unsafe '{{ splunk_password }}'
        SPLUNK_VALIDATE_CERTS: !unsafe '{{ splunk_validate_certs }}'

controller_credentials:
  - name: Splunk Enterprise Admin
    credential_type: Splunk Enterprise
    organization: Ansible Product Demos (APD)
    update_secrets: false
    state: exists
    inputs:
      splunk_user: '{{ lookup("env","SPLUNK_USER") | default("admin", true) }}'
      splunk_password: '{{ lookup("env","SPLUNK_PASSWORD") | default(vault_splunk_password, true) | default("changeme123") }}'
      splunk_validate_certs: '{{ lookup("env","SPLUNK_VALIDATE_CERTS") | default("true") }}'

controller_execution_environments:
  - name: Splunk Demo EE
    image: quay.io/jce-redhat/splunk-ee:latest
    organization: Ansible Product Demos (APD)

controller_templates:
  - name: Splunk | AWS | Deploy Splunk Enterprise EC2 instance
    job_type: run
    inventory: Ansible Product Demos Inventory
    credentials:
      - AWS
    project: APD Extras
    playbook: demos/eda_splunk/deploy-splunk-ec2.yml
    execution_environment: Splunk Demo EE
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: AWS region
          variable: splunk_aws_region
          required: true
          type: multiplechoice
          choices:
            - us-east-1
            - us-east-2
            - us-west-1
            - us-west-2
        - question_name: AWS VPC name
          description: Existing VPC where the Splunk security group will be created
          variable: splunk_vpc_name
          required: true
          type: text
          default: aws-test-vpc
        - question_name: AWS subnet name
          description: Existing subnet where the Splunk instance will be deployed
          variable: splunk_subnet_name
          required: true
          type: text
          default: aws-test-subnet
        - question_name: AWS keypair name
          description: Existing key to attach to the Splunk instance
          variable: splunk_keypair_name
          required: true
          type: text
          default: aws-test-key
        - question_name: Splunk instance name
          variable: splunk_instance_name
          required: false
          type: text
          default: apd-splunk
        - question_name: Splunk instance type
          variable: splunk_instance_type
          required: false
          type: multiplechoice
          choices:
            - t3.medium
            - t3.large
            - t3.xlarge
          default: t3.medium

  - name: Splunk | Configure HAProxy SSL
    job_type: run
    inventory: Ansible Product Demos Inventory
    credentials:
      - AWS
      - APD Machine Credential
    project: APD Extras
    playbook: demos/eda_splunk/configure-haproxy.yml
    execution_environment: Splunk Demo EE
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Splunk instance name
          variable: splunk_instance_name
          required: true
          type: text
          default: apd-splunk

  - name: Splunk | Install Splunk Enterprise
    job_type: run
    inventory: Ansible Product Demos Inventory
    credentials:
      - AWS
      - APD Machine Credential
      - Splunk Enterprise Admin
    project: APD Extras
    playbook: demos/eda_splunk/install-splunk.yml
    execution_environment: Splunk Demo EE
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Splunk instance name
          variable: splunk_instance_name
          required: true
          type: text
          default: apd-splunk
        - question_name: Splunk download URL
          description: URL to Splunk Enterprise RPM file (https:// or s3://)
          variable: splunk_download_url
          required: true
          type: text

  - name: Splunk | Configure Splunk settings
    job_type: run
    inventory: Ansible Product Demos Inventory
    credentials:
      - AWS
      - APD Machine Credential
      - Splunk Enterprise Admin
    project: APD Extras
    playbook: demos/eda_splunk/configure-splunk.yml
    execution_environment: Splunk Demo EE
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Splunk instance name
          variable: splunk_instance_name
          required: true
          type: text
          default: apd-splunk
        - question_name: Enable Splunk Web (port 8000)
          variable: enable_splunk_web
          required: true
          type: multiplechoice
          choices:
            - 'true'
            - 'false'
          default: 'true'

  - name: Splunk | Install Universal Forwarder
    job_type: run
    inventory: Ansible Product Demos Inventory
    credentials:
      - AWS
      - APD Machine Credential
      - Splunk Enterprise Admin
    project: APD Extras
    playbook: demos/eda_splunk/install-forwarder.yml
    execution_environment: Splunk Demo EE
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Client instance name
          variable: client_instance_name
          required: true
          type: text
          default: apd-splunk-client
        - question_name: Splunk indexer host
          description: Hostname or IP of Splunk Enterprise server
          variable: splunk_indexer_host
          required: true
          type: text
          default: apd-splunk
        - question_name: Splunk Universal Forwarder download URL
          description: URL to Universal Forwarder RPM file (https:// or s3://)
          variable: splunk_forwarder_download_url
          required: true
          type: text

  - name: Splunk | Add user to Splunk RHEL client
    job_type: run
    inventory: Ansible Product Demos Inventory
    credentials:
      - APD Machine Credential
    project: APD Extras
    playbook: demos/eda_splunk/add-new-user.yml
    execution_environment: Product Demos EE
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Splunk client instance name
          variable: target_hosts
          required: true
          type: text
          default: apd-splunk-client
        - question_name: New user name
          description: Username for new account
          variable: new_account_username
          required: true
          type: text
          default: demouser

controller_workflows:
  - name: Deploy Splunk Enterprise in AWS
    description: Deploy Splunk Enterprise on an EC2 instance
    organization: Ansible Product Demos (APD)
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: AWS region
          type: multiplechoice
          variable: create_vm_aws_region
          required: true
          choices:
            - us-east-1
            - us-east-2
            - us-west-1
            - us-west-2
        - question_name: AWS resource owner
          type: text
          variable: create_vm_aws_owner_tag
          required: true
        - question_name: AWS keypair public key content
          type: textarea
          variable: aws_public_key
          required: true
        - question_name: Splunk instance name
          type: text
          variable: splunk_instance_name
          required: true
          default: apd-splunk
        - question_name: Splunk instance type
          type: multiplechoice
          variable: splunk_instance_type
          required: true
          choices:
            - t3.medium
            - t3.large
            - t3.xlarge
          default: t3.medium
        - question_name: RHEL 9 instance name
          type: text
          variable: create_vm_vm_name
          required: true
          default: apd-splunk-client
        - question_name: RHEL 9 instance type
          type: multiplechoice
          variable: create_vm_aws_instance_size
          required: true
          choices:
            - t3.small
            - t3.medium
            - t3.large
          default: t3.small
        - question_name: Splunk download URL
          description: URL to Splunk Enterprise RPM file (https:// or s3://)
          type: text
          variable: splunk_download_url
          required: true
        - question_name: Splunk Universal Forwarder download URL
          description: URL to Universal Forwarder RPM file (https:// or s3://)
          type: text
          variable: splunk_forwarder_download_url
          required: true
    simplified_workflow_nodes:
      - identifier: Create Keypair
        unified_job_template: Cloud | AWS | Create Keypair
        success_nodes:
          - Create Splunk instance
          - Create RHEL9 instance
        failure_nodes:
          - Ticket - Keypair Failed
      - identifier: Create VPC
        unified_job_template: Cloud | AWS | Create VPC
        success_nodes:
          - Create Splunk instance
          - Create RHEL9 instance
        failure_nodes:
          - Ticket - VPC Failed
      - identifier: Ticket - Keypair Failed
        unified_job_template: SUBMIT FEEDBACK
        extra_data:
          feedback: Failed to create AWS keypair
      - identifier: Create Splunk instance
        unified_job_template: Splunk | AWS | Deploy Splunk Enterprise EC2 instance
        all_parents_must_converge: true
        success_nodes:
          - Inventory Sync
      - identifier: Create RHEL9 instance
        unified_job_template: Cloud | AWS | Create VM
        all_parents_must_converge: true
        extra_data:
          create_vm_vm_deployment: splunk_demo
          create_vm_vm_purpose: demo
          create_vm_vm_environment: Dev
          vm_blueprint: rhel9
        success_nodes:
          - Inventory Sync
      - identifier: Inventory Sync
        unified_job_template: AWS Inventory
        all_parents_must_converge: true
        success_nodes:
          - Install Splunk
          - Install Forwarder
      - identifier: Install Splunk
        unified_job_template: Splunk | Install Splunk Enterprise
        success_nodes:
          - Configure Splunk
      - identifier: Install Forwarder
        unified_job_template: Splunk | Install Universal Forwarder
        success_nodes: []
      - identifier: Configure Splunk
        unified_job_template: Splunk | Configure Splunk settings
        success_nodes:
          - Configure HAProxy
      - identifier: Configure HAProxy
        unified_job_template: Splunk | Configure HAProxy SSL
      - identifier: Ticket - VPC Failed
        unified_job_template: SUBMIT FEEDBACK
        extra_data:
          feedback: Failed to create AWS VPC

eda_credentials:
  - name: AAP Credential for EDA
    description: Credential allowing rulebook activations to connect to the automation controller
    state: present
    credential_type: Red Hat Ansible Automation Platform
    organization: Ansible Product Demos (APD)
    inputs:
      # Note: API path required in AAP 2.5+ for AAP credential used by EDA
      host: '{{ lookup("env","AAP_HOSTNAME") | default("https://example.invalid") }}/api/controller'
      username: '{{ lookup("env","AAP_USERNAME") | default(omit) }}'
      password: '{{ lookup("env","AAP_PASSWORD") | default(omit) }}'
      oauth_token: '{{ lookup("env","AAP_TOKEN") | default(omit) }}'
      verify_ssl: '{{ lookup("env","AAP_VALIDATE_CERTS") | default(omit) }}'

  - name: Splunk API token
    description: Token credential for Splunk to authenticate webhook calls to EDA event stream
    state: present
    credential_type: Token Event Stream
    organization: Ansible Product Demos (APD)
    inputs:
      token: '{{ lookup("env","SPLUNK_EDA_TOKEN") | default("CHANGEME-EDA-Demo", true) }}'

eda_projects:
  - name: APD Extras
    description: Additional AAP resources for use with Ansible Product Demos
    state: present
    scm_url: https://github.com/jce-redhat/apd-extras.git
    scm_branch: '{{ apd_extras_git_repo_branch | default("main") }}'
    organization: Ansible Product Demos (APD)

eda_event_streams:
  - name: Splunk Events
    state: present
    organization: Ansible Product Demos (APD)
    credential_name: Splunk API token
    forward_events: true

eda_rulebook_activations:
  - name: Splunk Useradd to ServiceNow
    description: Monitor user creation events from Splunk and create ServiceNow incidents
    state: enabled
    organization: Ansible Product Demos (APD)
    project: APD Extras
    rulebook: splunk-useradd.yml
    decision_environment: Default Decision Environment
    eda_credentials:
      - AAP Credential for EDA
    event_streams:
      - event_stream: Splunk Events
        source_name: Splunk Events  # must match the source name in the rulebook
    restart_policy: on-failure
    log_level: info

...
# vim: ft=yaml.ansible
