---
- name: Install Splunk Enterprise on EC2 instance
  hosts: "{{ splunk_instance_name | default('apd-splunk') }}"
  become: true
  gather_facts: true

  vars:
    splunk_download_url: '{{ splunk_download_url | default("") }}'
    # Splunk installation defaults
    splunk:
      user: splunk
      group: splunk
      exec: /opt/splunk/bin/splunk
      home: /opt/splunk
      license_uri: null  # Use Splunk Free license
      admin_password: '{{ lookup("env", "SPLUNK_ADMIN_PASSWORD") | default("changeme123") }}'
      build_location: '{{ splunk_download_url if splunk_download_url else omit }}'
      opt:
        splunk_home_ownership_enforcement: false

  pre_tasks:
    - name: Ensure Splunk admin password is set
      ansible.builtin.assert:
        that:
          - 'lookup("env", "SPLUNK_ADMIN_PASSWORD") | length > 0'
        fail_msg: >
          'SPLUNK_ADMIN_PASSWORD' variable must be set, either as an environment
          variable or in an attached AAP credential

  tasks:
    - name: Install AWS CLI (for S3 downloads)
      ansible.builtin.package:
        name: awscli
        state: present
      when:
        - splunk_download_url | length > 0
        - splunk_download_url.startswith('s3://')

    - name: Download Splunk Enterprise RPM from HTTPS
      ansible.builtin.get_url:
        url: '{{ splunk.build_location }}'
        dest: /tmp/splunk.rpm
        mode: '0644'
      when:
        - splunk_download_url | length > 0
        - not splunk_download_url.startswith('s3://')

    - name: Download Splunk Enterprise RPM from S3
      ansible.builtin.command:
        cmd: aws s3 cp {{ splunk_download_url }} /tmp/splunk.rpm
        creates: /tmp/splunk.rpm
      environment:
        AWS_ACCESS_KEY_ID: '{{ lookup("env", "AWS_ACCESS_KEY_ID") }}'
        AWS_SECRET_ACCESS_KEY: '{{ lookup("env", "AWS_SECRET_ACCESS_KEY") }}'
      when:
        - splunk_download_url | length > 0
        - splunk_download_url.startswith('s3://')

    - name: Install Splunk Enterprise RPM
      ansible.builtin.yum:
        name: /tmp/splunk.rpm
        state: present
        disable_gpg_check: true
      when: splunk_download_url | length > 0

    - name: Accept Splunk license and set admin password
      ansible.builtin.command:
        cmd: >
          {{ splunk.exec }} start
          --accept-license
          --answer-yes
          --no-prompt
          --seed-passwd {{ splunk.admin_password }}
        creates: '{{ splunk.home }}/etc/splunk-launch.conf'
      become_user: '{{ splunk.user }}'

    - name: Enable Splunk to start at boot
      ansible.builtin.command:
        cmd: '{{ splunk.exec }} enable boot-start -user {{ splunk.user }} --accept-license --answer-yes'
      args:
        creates: /etc/systemd/system/Splunkd.service

    - name: Ensure Splunk is running
      ansible.builtin.command:
        cmd: '{{ splunk.exec }} status'
      register: splunk_status
      changed_when: false
      failed_when: false

    - name: Start Splunk if not running
      ansible.builtin.command:
        cmd: '{{ splunk.exec }} start'
      become_user: '{{ splunk.user }}'
      when: splunk_status.rc != 0

  post_tasks:
    - name: Display Splunk web URL
      ansible.builtin.debug:
        msg:
          - "Splunk Enterprise installed successfully"
          - "Splunk Web URL: http://{{ ansible_default_ipv4.address }}:8000"
          - "Username: admin"
          - "Password: {{ splunk.admin_password }}"

...
